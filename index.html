<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사유담심리상담연구소 · 원주 심리상담</title>
<meta name="description" content="원주 심리상담센터 사유담. 개인·부부·가족 심리상담과 심리검사, 사진치료.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== 공통 헤더(네비게이션)가 여기 자동 생성됩니다 ===== -->
<div id="siteHeader"></div>

<!-- ===== 메인 슬라이드 ===== -->
<div class="hero-slider" id="top">
  <div id="slides"></div>
  <button class="slide-nav slide-prev" id="slidePrev" aria-label="이전">‹</button>
  <button class="slide-nav slide-next" id="slideNext" aria-label="다음">›</button>
  <div class="slide-dots" id="slideDots"></div>
</div>

<!-- ===== 3개 퀵버튼 ===== -->
<div class="quick">
  <div class="wrap">
    <div class="quick-grid" id="quickGrid"></div>
  </div>
</div>

<!-- ===== 상담진 소개 ===== -->
<section id="counselor">
  <div class="wrap">
    <div class="eyebrow">Counselor</div>
    <h2 class="section-title">상담진 소개</h2>
    <div class="counselor-grid">
      <div class="portrait" id="portrait">상담사 사진<br>(준비 중)</div>
      <div>
        <div class="counselor-name" id="cName"></div>
        <div class="counselor-role" id="cRole"></div>
        <blockquote class="counselor-phil" id="cPhil"></blockquote>
        <div class="prof-wrap" id="cCareer"></div>
      </div>
    </div>
    <div style="text-align:center;margin-top:36px">
      <a class="more-link" href="pages/counselor.html">상담사 소개 더 보기 →</a>
    </div>
  </div>
</section>

<!-- ===== 협력기관 흐르는 띠 ===== -->
<div class="partners">
  <div class="partners-track" id="partnersTrack"></div>
</div>

<!-- ===== 오시는 길 ===== -->
<section class="location" id="location">
  <div class="wrap">
    <div class="eyebrow">Location</div>
    <div class="loc-head">
      <h2 class="section-title">오시는 길</h2>
      <a class="naver-btn naver-btn-sm" href="https://map.naver.com/p/entry/place/2046821271?c=15.00,0,0,0,dh&placePath=%2Fhome%3Ffrom%3Dmap%26fromPanelNum%3D1%26additionalHeight%3D76%26timestamp%3D202607222132%26locale%3Dko%26svcName%3Dmap_pcv5" target="_blank" rel="noopener"><span class="nb-mark">N</span>네이버지도<span class="nb-arw">›</span></a>
    </div>
    <p class="section-lead addr" id="addrLead" style="font-family:'Gowun Batang',serif;color:var(--ink)"></p>
    <div class="map-img-wrap" id="mapWrap"></div>
  </div>
</section>

<!-- ===== 공통 하단 정보 바 + 푸터가 여기 자동 생성됩니다 ===== -->
<div id="siteFooter"></div>

<!-- ===== 상담소 둘러보기 모달 ===== -->
<div class="tour-modal" id="tourModal">
  <div class="tour-head">
    <h3>상담소 둘러보기</h3>
    <button class="tour-close" id="tourClose">×</button>
  </div>
  <div class="tour-viewer">
    <button class="tour-arrow tour-prev" id="tourPrev">‹</button>
    <img id="tourImg" src="" alt="상담소 내부">
    <button class="tour-arrow tour-next" id="tourNext">›</button>
  </div>
  <div class="tour-count" id="tourCount"></div>
</div>

<script src="data.js"></script>
<script src="common.js"></script>
<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=46970350652ce382f2b139fda1c9e3fa&libraries=services&autoload=false"></script>
<script src="app.js"></script>
</body>
</html>
