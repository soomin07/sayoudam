<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사진 갤러리 · 사유담심리상담연구소</title>
<meta name="description" content="사유담 사진 갤러리. 전시 사진 감상 및 세트 구매 문의.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
</head>
<body>

<div id="siteHeader"></div>

<div class="page-hero">
  <div class="wrap">
    <div class="eyebrow">Gallery</div>
    <h1>사진 갤러리</h1>
    <p>사유담이 담아온 사진을 감상하고, 마음에 드는 작품은 세트 단위로 구매를 문의하실 수 있습니다.</p>
  </div>
</div>

<div class="gallery-body">
  <div class="wrap">
    <p class="gallery-intro">사진은 전시용이며, 결제는 문의를 통해 안내해 드립니다. 원하시는 세트를 알려주세요.</p>
    <div id="gallerySets"></div>
    <a class="back-home" href="../index.html">← 홈으로 돌아가기</a>
  </div>
</div>

<!-- 라이트박스 (크게 보기) -->
<div class="lb" id="lb">
  <div class="lb-head"><button class="lb-close" id="lbClose" aria-label="닫기">×</button></div>
  <div class="lb-view">
    <button class="lb-arrow lb-prev" id="lbPrev" aria-label="이전">‹</button>
    <img id="lbImg" src="" alt="사진">
    <button class="lb-arrow lb-next" id="lbNext" aria-label="다음">›</button>
  </div>
  <div class="lb-foot">
    <div class="lb-count" id="lbCount"></div>
    <a class="lb-buy" id="lbBuy" href="#" target="_blank" rel="noopener">이 세트 구매 문의</a>
  </div>
</div>

<div id="siteFooter"></div>

<script src="../data.js"></script>
<script src="../common.js"></script>
<script>
(function(){
  var g = (SITE.gallery) || {};
  var buyForm = g.buyForm || SITE.applyForm || '#';
  var sets = g.sets || [];
  var host = document.getElementById('gallerySets');

  function pad(n){ return (n<10?'0':'') + n; }
  function fileFor(set, i){ return '../' + set.folder + '/photo' + pad(i+1) + '.' + (set.ext||'jpg'); }

  // 라이트박스는 세트 하나 안에서만 이동
  var lb = document.getElementById('lb');
  var lbImg = document.getElementById('lbImg');
  var lbCount = document.getElementById('lbCount');
  var lbBuy = document.getElementById('lbBuy');
  var curSet = null, cur = 0;

  function openLb(set, i){ curSet = set; cur = i; showLb(); lb.classList.add('on'); document.body.style.overflow='hidden'; }
  function closeLb(){ lb.classList.remove('on'); document.body.style.overflow=''; }
  function showLb(){
    lbImg.src = fileFor(curSet, cur);
    lbImg.alt = curSet.name + ' 사진 ' + pad(cur+1);
    lbCount.textContent = curSet.name + ' · ' + (cur+1) + ' / ' + curSet.count;
    lbBuy.textContent = curSet.name + ' 구매 문의';
    lbBuy.href = buyForm;
  }
  function move(d){ cur = (cur + d + curSet.count) % curSet.count; showLb(); }
  document.getElementById('lbClose').addEventListener('click', closeLb);
  document.getElementById('lbPrev').addEventListener('click', function(){ move(-1); });
  document.getElementById('lbNext').addEventListener('click', function(){ move(1); });
  lb.addEventListener('click', function(e){ if(e.target === lb) closeLb(); });
  document.addEventListener('keydown', function(e){
    if(!lb.classList.contains('on')) return;
    if(e.key === 'Escape') closeLb();
    else if(e.key === 'ArrowLeft') move(-1);
    else if(e.key === 'ArrowRight') move(1);
  });

  if(!sets.length){
    host.innerHTML = '<div class="gallery-ph" style="position:static;padding:60px 20px">갤러리 사진이 아직 등록되지 않았습니다.</div>';
    return;
  }

  sets.forEach(function(set){
    var sec = document.createElement('section');
    sec.className = 'gset';

    // 세트 헤더
    var head = document.createElement('div');
    head.className = 'gset-head';
    head.innerHTML =
      '<div class="gset-title-row">' +
        '<h2 class="gset-title">' + set.name + '</h2>' +
        (set.badge ? '<span class="gset-badge">' + set.badge + '</span>' : '') +
        '<span class="gset-count">' + set.count + '점</span>' +
      '</div>' +
      (set.desc ? '<p class="gset-desc">' + set.desc + '</p>' : '') +
      (set.saleNote ? '<p class="gset-note"><span class="gset-note-ico">◆</span>' + set.saleNote + '</p>' : '') +
      '<a class="gset-buy" href="' + buyForm + '" target="_blank" rel="noopener">' + set.name + ' 구매 문의</a>';
    sec.appendChild(head);

    // 사진 그리드
    var grid = document.createElement('div');
    grid.className = 'gallery-grid';
    for(var i=0; i<set.count; i++){
      (function(i){
        var num = pad(i+1);
        var cell = document.createElement('div');
        cell.className = 'gallery-item';
        var img = new Image();
        img.alt = set.name + ' 사진 ' + num;
        img.loading = 'lazy';
        img.decoding = 'async';
        img.src = fileFor(set, i);
        img.onerror = function(){ cell.innerHTML = '<div class="gallery-ph">사진 준비 중<br>#' + num + '</div>' + tagHtml(i); };
        cell.appendChild(img);
        cell.insertAdjacentHTML('beforeend', tagHtml(i));
        cell.addEventListener('click', function(){ openLb(set, i); });
        grid.appendChild(cell);
      })(i);
    }
    function tagHtml(i){ var label = (set.tagPrefix || set.name) + '-' + (i+1); return '<span class="gitem-tag">' + label + '</span>'; }
    sec.appendChild(grid);
    host.appendChild(sec);
  });
})();
</script>
</body>
</html>
